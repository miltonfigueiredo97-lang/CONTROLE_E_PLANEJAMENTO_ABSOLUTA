<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tabelas.css">
  <link rel="stylesheet" href="css/modulos.css">
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/images/logo-absoluta.png" class="logo-full" alt="Absoluta"
           onerror="this.parentElement.innerHTML='<div class=\'logo-fallback\'><div class=\'logo-icon\'><span style=\'font-size:1.3rem;font-weight:900;color:#000;\'>A</span></div></div>'">
    </div>
    <div class="sidebar-obra-selector"><label>Obra ativa</label><select id="seletor-obra"><option value="">Selecione...</option></select></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-title">Principal</div>
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="obras.html"><span class="nav-icon">🏗️</span> Obras</a>
      <a href="configuracao-obra.html"><span class="nav-icon">⚙️</span> Config. da Obra</a>
      <div class="sidebar-section-title">Produção</div>
      <a href="planejamento.html"><span class="nav-icon">📅</span> Planejamento</a>
      <a href="levantamento.html"><span class="nav-icon">📐</span> Levantamentos</a>
      <a href="controle.html"><span class="nav-icon">✅</span> Controle</a>
      <div class="sidebar-section-title">Gestão</div>
      <a href="restricoes.html"><span class="nav-icon">🚧</span> Restrições</a>
      <a href="semanal.html"><span class="nav-icon">📋</span> Semanal</a>
      <a href="medicoes.html"><span class="nav-icon">📏</span> Medições</a>
      <div class="sidebar-section-title">Custos</div>
      <a href="orcamentos.html"><span class="nav-icon">💰</span> Orçamentos</a>
      <a href="suprimentos.html"><span class="nav-icon">📦</span> Suprimentos</a>
      <a href="materiais.html"><span class="nav-icon">🧱</span> Materiais</a>
      <div class="sidebar-section-title">Análise</div>
      <a href="relatorios.html"><span class="nav-icon">📈</span> Relatórios</a>
      <a href="histograma.html"><span class="nav-icon">📊</span> Histograma</a>
      <a href="admin-permissoes.html"><span class="nav-icon">🔑</span> Permissões</a>
      <div class="sidebar-section-title">Sistema</div>
      <a href="notas-versao.html"><span class="nav-icon">📋</span> Notas de Versão <span class="nav-version">V2.5.0</span></a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar">U</div>
      <div class="user-info"><div class="user-name">Usuário</div><div class="user-role">—</div></div>
      <button class="btn-logout" onclick="Auth.logout()" title="Sair">⏻</button>
    </div>
  </aside>
  <header class="header">
    <div class="header-title"><h1>Notas de Versão</h1></div>
  </header>
  <main class="content">
    <div id="notas-content"></div>
  </main>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/database.js"></script>
<script src="js/router.js"></script>
<script src="js/permissions.js"></script>
<script src="js/audit.js"></script>
<script src="js/utils.js"></script>
<script src="js/notas-versao.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!initFirebase()) return;
    const user = await Auth.init();
    if (!user) { window.location.href = 'login.html'; return; }
    Router.init();
    await Router.popularSeletorObras();
    // Render user info
    const p = Auth.getProfile();
    if (p) {
      const n = document.querySelector('.user-name'); if (n) n.textContent = p.nome || p.email;
      const r = document.querySelector('.user-role'); if (r) r.textContent = p.perfil === 'admin' ? 'Administrador' : 'Usuário';
      const a = document.querySelector('.user-avatar'); if (a) a.textContent = (p.nome || p.email).charAt(0).toUpperCase();
    }
    NotasVersao.render('notas-content');
  });
</script>
</body>
</html>
