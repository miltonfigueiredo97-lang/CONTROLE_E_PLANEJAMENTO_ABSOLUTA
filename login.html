<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Controle e Planejamento de Obras Absoluta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div class="login-page">
  <!-- Lado esquerdo: identidade visual -->
  <div class="login-left">
    <div class="login-brand">
      <img src="assets/images/logo-absoluta.png" alt="Absoluta" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
      <div id="logo-fallback" style="display:none;margin-bottom:24px;">
        <div style="width:64px;height:64px;background:var(--cor-primaria);border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
          <span style="font-size:2rem;font-weight:900;color:#000;">A</span>
        </div>
      </div>
      <div class="accent-bar"></div>
      <h2>Controle e Planejamento</h2>
      <p>Sistema interno de gestão de obras</p>
    </div>
  </div>

  <!-- Lado direito: formulário -->
  <div class="login-right">
    <div class="login-box">
      <div class="login-logo">
        <div class="accent"></div>
        <h1>Bem-vindo</h1>
        <p>Acesse com suas credenciais</p>
      </div>

      <div id="login-erro" class="hidden" style="background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:6px;font-size:0.85rem;margin-bottom:16px;border-left:3px solid #dc2626;"></div>

      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-grupo">
          <label>E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="form-grupo" style="margin-bottom:20px;">
          <label>Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn btn-primario" id="btn-login">Entrar</button>
      </form>

      <p style="margin-top:32px;font-size:0.72rem;color:#aaa;text-align:center;">
        Absoluta Construtora e Incorporadora © 2025
      </p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  if (initFirebase()) {
    auth.onAuthStateChanged(user => { if (user) window.location.href = 'dashboard.html'; });
  }
  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn-login');
    const erro = document.getElementById('login-erro');
    erro.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Entrando...';
    const result = await Auth.login(email, senha);
    if (result.success) { window.location.href = 'dashboard.html'; }
    else { erro.textContent = result.error; erro.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Entrar'; }
  }
</script>
</body>
</html>
